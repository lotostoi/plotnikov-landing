name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Не запускать два деплоя одновременно на один репозиторий
concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка обязательных секретов
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          missing=()
          [ -z "$VPS_HOST" ] && missing+=(VPS_HOST)
          [ -z "$VPS_USER" ] && missing+=(VPS_USER)
          [ -z "$VPS_SSH_KEY" ] && missing+=(VPS_SSH_KEY)
          [ -z "$VPS_APP_DIR" ] && missing+=(VPS_APP_DIR)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::В GitHub Actions не заданы секреты: ${missing[*]}"
            echo "См. documentation/deploy/github-actions-autodeploy.md"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.VPS_APP_DIR }}"
            export BRANCH="${{ github.ref_name }}"
            cd "${APP_DIR}"
            ./scripts/deploy.sh
