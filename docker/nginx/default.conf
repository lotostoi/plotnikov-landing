server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # JS не отдаём как статику — Livewire/Filament грузят свой JS через PHP-роуты.
    location ~* \.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 8 16k;
        include fastcgi_params;
        # Чтобы Laravel видел HTTPS за внешним SSL-прокси (сессия/куки/редиректы; иначе «логин только перезагружает форму»).
        # Hardcode https: nginx сам работает по HTTP, SSL снимает внешний прокси.
        # $scheme здесь всегда "http" → Livewire генерирует подпись с https://, а проверяет как http:// → 401.
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        # $http_host сохраняет порт из Host-заголовка (localhost:18080 / your-domain.com).
        fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
    }

    location ~ /\.ht {
        deny all;
    }
}
