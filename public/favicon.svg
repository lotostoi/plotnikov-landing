<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#F5F0E1"/>

  <!-- Outer circle = wholeness & support -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#2F5D5A" stroke-width="2.5"/>

  <!-- Inner subtle circle -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#2F5D5A" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Abstract face profile - serene, slightly looking forward/down with a gentle nod -->
  <path d="M 22 38
           C 22 32, 24 28, 28 25
           C 30 23.5, 31 22, 31 20
           C 31 18.5, 32 17.5, 33 17.5
           C 34 17.5, 35 18.5, 35 20
           C 35 22, 36 23.5, 38 25
           C 41 27.5, 44 30, 45 34
           C 46 38, 42 42, 38 43"
        fill="none" stroke="#2F5D5A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hair/Afro/bob suggestion -->
  <path d="M 28 20
           C 28 14, 38 14, 40 20
           C 41 22, 41 23, 40 24"
        fill="none" stroke="#2F5D5A" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Eye (closed, gentle) -->
  <path d="M 30 27 C 31 28, 33 28, 34 27" fill="none" stroke="#2F5D5A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Subtle smile -->
  <path d="M 31 33 C 33 34.5, 36 34, 38 32" fill="none" stroke="#2F5D5A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hand/heart subtle support shape near chin -->
  <circle cx="44" cy="38" r="3.5" fill="none" stroke="#2F5D5A" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Small dot accent - warmth -->
  <circle cx="46" cy="37" r="1.2" fill="#E8A87C"/>
</svg>
